<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliography - Categories & Modal</title>
    <style>
        /* 基础重置 (与之前类似，保持风格统一) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #1a1a1a; color: #ddd; padding: 3rem 5%; }
        .site-header { margin-bottom: 3rem; border-bottom: 1px solid #333; padding-bottom: 1rem; }
        .site-header h1 { font-size: 1.1rem; letter-spacing: 2px; font-weight: 400; color: #999; }

        /* 网格布局 */
        .biblio-grid { display: grid; grid-template-columns: repeat(5, 1fr); border-top: 1px solid #333; border-left: 1px solid #333; }
        .biblio-cell { padding: 2rem 1rem; border-right: 1px solid #333; border-bottom: 1px solid #333; display: flex; flex-direction: column; }
        
        /* 封面交互：增加点击提示 */
        .book-cover { height: 180px; margin-bottom: 1.5rem; display: flex; align-items: flex-end; position: relative; cursor: pointer; }
        .book-cover img { max-height: 100%; max-width: 100%; object-fit: contain; filter: grayscale(100%); transition: all 0.3s ease; }
        .book-cover:hover img { filter: grayscale(0%); transform: scale(1.02); }
        /* 悬停时显示 "查看详情" 提示 */
        .book-cover::after {
            content: "VIEW DETAILS"; position: absolute; bottom: 50%; left: 50%; transform: translate(-50%, 50%);
            background: rgba(0,0,0,0.8); color: #fff; padding: 0.5rem 1rem; font-size: 0.75rem; letter-spacing: 1px;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        .book-cover:hover::after { opacity: 1; }

        .book-title { font-size: 1.1rem; color: #eee; margin-bottom: 1rem; }
        .book-meta { font-size: 0.85rem; color: #888; margin-bottom: 0.3rem; display: flex; gap: 0.5rem; }
        .meta-label { color: #555; min-width: 3.5rem; }
        
        /* 新增：分类标签样式 */
        .category-tag {
            display: inline-block; padding: 0.2rem 0.5rem; background: #333; color: #aaa; 
            font-size: 0.7rem; border-radius: 2px; margin-top: 0.5rem; align-self: flex-start;
        }

        /* === 模态框 (Lightbox Modal) === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10,10,10,0.95);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: #1a1a1a; width: 90%; max-width: 1000px; display: flex; border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative;
        }
        
        .modal-close {
            position: absolute; top: 1rem; right: 1.5rem; color: #888; font-size: 2rem; cursor: pointer; background: none; border: none; transition: color 0.2s;
        }
        .modal-close:hover { color: #fff; }

        /* 左侧大图 */
        .modal-image-container { flex: 1; padding: 2rem; background: #111; display: flex; justify-content: center; align-items: center; }
        .modal-image-container img { max-width: 100%; max-height: 70vh; object-fit: contain; }

        /* 右侧详细信息 */
        .modal-details { flex: 1; padding: 3rem; display: flex; flex-direction: column; justify-content: center; }
        .modal-details h2 { font-size: 2rem; color: #fff; margin-bottom: 1rem; font-weight: 300; }
        .modal-details .meta-row { border-bottom: 1px solid #333; padding: 1rem 0; display: flex; justify-content: space-between; }
        .modal-details .meta-row strong { color: #666; font-weight: normal; }
        .modal-details .meta-row span { color: #ccc; }
        .modal-desc { margin-top: 2rem; color: #888; line-height: 1.6; font-size: 0.9rem; }

        @media (max-width: 900px) { .biblio-grid { grid-template-columns: repeat(3, 1fr); } .modal-content { flex-direction: column; } .modal-image-container img { max-height: 40vh; } }
    </style>
</head>
<body>

    <header class="site-header"><h1>BIBLIOGRAPHY</h1></header>

    <main class="biblio-grid" id="gridContainer">
        <article class="biblio-cell">
            <div class="book-cover" onclick="openModal('title1', '2007/6', 'Rm Verlag', 'https://images.unsplash.com/photo-1549488331-48350163359d?w=800', '人物, 早期作品', '这是一本关于东京街头人物的早期探索影集...')">
                <img src="https://images.unsplash.com/photo-1549488331-48350163359d?w=300&fit=crop" alt="Cover">
            </div>
            <h2 class="book-title">Daido Moriyama</h2>
            <div class="book-meta"><span class="meta-label">出版年</span> <span>2007/6</span></div>
            <div class="book-meta"><span class="meta-label">出版社</span> <span>Rm Verlag, S.L.</span></div>
            <span class="category-tag">人物 / People</span>
        </article>

        <article class="biblio-cell">
            <div class="book-cover" onclick="openModal('title2', '2007/2', '月曜社', 'https://images.unsplash.com/photo-1563220473-b265691d1e4e?w=800', '风景, 城市', '记录了大阪城市建设过程中的光影变幻。')">
                <img src="https://images.unsplash.com/photo-1563220473-b265691d1e4e?w=300&fit=crop" alt="Cover">
            </div>
            <h2 class="book-title">大阪＋</h2>
            <div class="book-meta"><span class="meta-label">出版年</span> <span>2007/2</span></div>
            <div class="book-meta"><span class="meta-label">出版社</span> <span>月曜社</span></div>
            <span class="category-tag">风景 / Landscape</span>
        </article>
    </main>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-image-container">
                <img id="modalImg" src="" alt="Full Resolution Cover">
            </div>
            <div class="modal-details">
                <h2 id="modalTitle">Book Title</h2>
                <div class="meta-row"><strong>出版年 (Year)</strong> <span id="modalYear"></span></div>
                <div class="meta-row"><strong>出版社 (Publisher)</strong> <span id="modalPublisher"></span></div>
                <div class="meta-row"><strong>分类 (Categories)</strong> <span id="modalCategory"></span></div>
                <p class="modal-desc" id="modalDesc"></p>
            </div>
        </div>
    </div>

    <script>
        // 控制模态框的简单逻辑
        function openModal(title, year, publisher, imgSrc, category, desc) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalYear').innerText = year;
            document.getElementById('modalPublisher').innerText = publisher;
            document.getElementById('modalCategory').innerText = category;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalImg').src = imgSrc;
            
            document.getElementById('detailModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
            // 清空图片避免下次打开时闪烁旧图
            setTimeout(() => { document.getElementById('modalImg').src = ''; }, 300);
        }

        // 点击模态框外部背景关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
